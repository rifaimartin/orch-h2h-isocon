#no-change
{{- if .Values.createIngressGateway }}
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ .Values.environment.gatewayName }}
  namespace: {{.Values.environment.namespace }}
spec:
  selector:
    istio: ingressgateway # use istio default controller
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.environment.gatewayHost }}
{{- end }}