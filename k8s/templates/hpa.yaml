#no-change
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.service.name }}-hpa
  namespace: {{ .Values.environment.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.service.name }}
  minReplicas: {{ .Values.hpa.minreplicas }}
  maxReplicas: {{ .Values.hpa.maxreplicas }}
  metrics:
    - type: ContainerResource
      containerResource:
        name: cpu
        container: {{ .Values.service.name }}-pods
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.metrics.utilizationCPU }}
    - type: ContainerResource
      containerResource:
        name: memory
        container: {{ .Values.service.name }}-pods
        target:
          type: AverageValue
          averageValue: {{ .Values.hpa.metrics.averageMem }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.hpa.behavior.scaleUp.eval }}
      policies:
        - type: Pods
          value: {{ .Values.hpa.behavior.scaleUp.podsize }}
          periodSeconds: {{ .Values.hpa.behavior.scaleUp.period }}
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.hpa.behavior.scaleDown.eval }}
      selectPolicy: Max
      policies:
        - type: Percent
          value: {{ .Values.hpa.behavior.scaleDown.reducePercent }}
          periodSeconds: {{ .Values.hpa.behavior.scaleDown.period }}